<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <title>{{ site.title | default: "Healthterra" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0052D4">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <section class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
      
      <a href="{{ site.baseurl }}/" class="btn">Home</a>
      
    </section>

    <section class="main-content">
      {{ content }}

      <footer class="site-footer">
        <span class="site-footer-owner"><a href="https://github.com/powerkostas/healthterra">Healthterra</a> is maintained by <a href="https://github.com/powerkostas">PowerKostas</a>.</span>
      </footer>
    </section>
  </body>
</html>
